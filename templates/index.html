<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ オリジナル占い鑑定システム</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="stars-bg"></div>

  <header style="position:relative">
    <div style="position:absolute;top:16px;right:20px">
      <a href="/coconala-orders" style="color:var(--text-muted);text-decoration:none;font-size:0.85rem;padding:6px 12px;border:1px solid rgba(255,255,255,0.15);border-radius:6px;transition:background 0.2s" onmouseover="this.style.background='rgba(255,255,255,0.08)'" onmouseout="this.style.background=''">📋 受注管理</a>
    </div>
    <h1>✨ 天命鑑定 ✨</h1>
    <p>四柱推命 × 数秘術 × 動物占い　オリジナル統合鑑定</p>
  </header>

  <main>
    <!-- 入力フォーム -->
    <section id="input-section" class="card">
      <h2>🔮 鑑定を始める</h2>
      <form id="fortune-form">
        <div class="form-group">
          <label for="name">お名前（任意）</label>
          <input type="text" id="name" placeholder="山田 太郎">
        </div>
        <div class="form-group">
          <label for="birthdate">生年月日 <span class="required">*</span></label>
          <input type="date" id="birthdate" required>
        </div>
        <div class="form-group">
          <label for="concern">お悩み・ご相談 <span class="required">*</span></label>
          <textarea id="concern" rows="4" placeholder="例：仕事での人間関係に悩んでいます。今後どのように進めばよいでしょうか..." required></textarea>
        </div>
        <button type="submit" class="btn-primary" id="submit-btn">
          <span class="btn-icon">✨</span> 鑑定する
        </button>
      </form>

      <!-- 詳細鑑定オプション -->
      <div class="detail-option-box">
        <label class="detail-checkbox-label">
          <input type="checkbox" id="detail-option-cb">
          <span>✨ 詳細鑑定を希望する（掘り下げ質問を生成します）</span>
        </label>

        <div id="follow-up-section" class="hidden">
          <button type="button" id="generate-questions-btn" class="btn-secondary detail-generate-btn">
            🔍 掘り下げ質問を生成する
          </button>

          <div id="questions-loading" class="hidden questions-loading">
            <div class="spinner" style="width:28px;height:28px;margin:0 auto 10px"></div>
            <p>質問を生成しています...</p>
          </div>

          <div id="questions-container" class="hidden"></div>
        </div>
      </div>
    </section>

    <!-- 鑑定結果 -->
    <section id="result-section" class="card hidden">
      <div id="fortune-stats" class="stats-grid hidden">
        <div class="stat-card shichusuimei">
          <h3>🌙 四柱推命</h3>
          <div id="pillars"></div>
          <div id="five-elements"></div>
        </div>
        <div class="stat-card numerology">
          <h3>🔢 数秘術</h3>
          <div id="numbers"></div>
        </div>
        <div class="stat-card animal">
          <h3>🦁 動物占い</h3>
          <div id="animals"></div>
        </div>
      </div>

      <div class="reading-header">
        <h2>📜 鑑定結果</h2>
      </div>

      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>天命を読み解いています...</p>
      </div>

      <div id="reading-text" class="reading-text"></div>

      <div id="action-buttons" class="action-buttons hidden">
        <button id="image-btn" class="btn-primary" style="width:auto;padding:12px 24px">
          🖼️ 画像として保存
        </button>
        <button id="download-btn" class="btn-secondary">
          📥 テキスト保存
        </button>
        <button id="copy-btn" class="btn-secondary">
          📋 コピー
        </button>
        <button id="threads-btn" class="btn-secondary" style="background:rgba(0,0,0,0.3);border-color:rgba(255,255,255,0.3)">
          🧵 Threadsに投稿
        </button>
        <button id="new-reading-btn" class="btn-outline">
          🔮 新しい鑑定をする
        </button>
      </div>

      <div id="retry-area" class="hidden" style="margin-top:16px;padding:16px;background:rgba(255,107,157,0.1);border:1px solid rgba(255,107,157,0.3);border-radius:12px;">
        <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:12px">⚠️ 鑑定が途中で中断されました。続きを取得できます。</p>
        <button id="retry-btn" class="btn-secondary">
          🔄 続きを取得する
        </button>
      </div>
    </section>

    <!-- 履歴 -->
    <section id="history-section" class="card">
      <h2>📚 鑑定履歴</h2>
      <div id="history-list">
        <p class="empty-message">まだ鑑定履歴はありません</p>
      </div>
    </section>
  </main>

  <footer>
    <p>四柱推命 × 数秘術 × 動物占い　統合鑑定システム</p>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
